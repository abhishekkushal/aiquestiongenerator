<!DOCTYPE html>
<html>
<head>
    <title>Vector Search Test</title>
</head>

<body>

<h2>Search Syllabus Content</h2>

<input type="text" id="topic" placeholder="Enter topic (example: acids)">
<input type="text" id="domain" placeholder="Domain">
<input type="text" id="subject" placeholder="Subject">
<input type="text" id="contentTopic" placeholder="Content topic">
<input type="text" id="roleOrExam" placeholder="Role or exam">
<button onclick="search()">Search</button>

<h3>Results</h3>

<ul id="results"></ul>

<script>

function search() {

    const topic = document.getElementById("topic").value;
    const params = new URLSearchParams({
        topic,
        domain: document.getElementById("domain").value,
        subject: document.getElementById("subject").value,
        contentTopic: document.getElementById("contentTopic").value,
        roleOrExam: document.getElementById("roleOrExam").value
    });

    fetch("http://localhost:8080/search?" + params.toString())
    .then(response => response.json())
    .then(data => {

        const results = document.getElementById("results");
        results.innerHTML = "";

        data.forEach(chunk => {

            const li = document.createElement("li");
            li.textContent = chunk;

            results.appendChild(li);
        });

    })
    .catch(error => console.error("Error:", error));

}

</script>

</body>
</html>
