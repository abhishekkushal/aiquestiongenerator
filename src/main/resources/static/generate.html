<!DOCTYPE html>
<html>
<head>
    <title>AI MCQ Generator</title>

    <style>
        body{
            font-family: Arial;
            margin:40px;
        }

        textarea{
            width:100%;
            height:300px;
        }

        button{
            padding:8px 20px;
            font-size:16px;
        }

        select{
            padding:8px;
            font-size:16px;
            min-width:300px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
        }
    </style>

</head>

<body>

<h2>AI Question Generator</h2>

<label for="topic">Select Topic:</label>
<select id="topic">
    <option value="">-- Select a topic --</option>
</select>

<button onclick="generate()">Generate MCQ</button>

<h3>Generated Questions</h3>

<textarea id="result"></textarea>

<script>

function loadTopics() {
    fetch("http://localhost:8080/get-topics")
    .then(response => response.json())
    .then(topics => {
        const topicSelect = document.getElementById("topic");

        topics.forEach(topic => {
            const option = document.createElement("option");
            option.value = topic.name;
            option.textContent = topic.name;
            topicSelect.appendChild(option);
        });
    })
    .catch(error => {
        console.error("Error loading topics:", error);
    });
}

function generate(){

    const topic = document.getElementById("topic").value;

    if (!topic) {
        document.getElementById("result").value = "Please select a topic";
        return;
    }

    document.getElementById("result").value="Generating questions...";

    fetch("http://localhost:8080/generate-mcq?topic="+encodeURIComponent(topic))
    .then(response => response.text())
    .then(data => {

        document.getElementById("result").value=data;

    })
    .catch(error => {

        document.getElementById("result").value="Error generating questions";

    });

}

// Load topics when page loads
window.addEventListener('load', loadTopics);

</script>

</body>
</html>
