<!DOCTYPE html>
<html>
<head>
    <title>AI Question Generator</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; line-height: 1.5; }
        input, select, button { padding: 8px; margin: 6px 6px 6px 0; }
        .summary { margin: 20px 0; font-weight: bold; }
        .question-card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 999px; background: #eef3ff; color: #1d3d8f; font-size: 12px; font-weight: bold; margin-right: 8px; }
        .meta { margin-bottom: 12px; }
        pre { background: #f7f7f7; padding: 10px; border-radius: 6px; white-space: pre-wrap; }
    </style>
</head>
<body>

<h2>AI Question Generator</h2>

<div>
    <input type="text" id="topic" placeholder="Prompt topic">
    <select id="questionType">
        <option value="MCQ">MCQ</option>
        <option value="TRUE_FALSE">TRUE_FALSE</option>
        <option value="FILL_BLANK">FILL_BLANK</option>
        <option value="NUMERIC_RANGE">NUMERIC_RANGE</option>
        <option value="SHORT_ANSWER">SHORT_ANSWER</option>
    </select>
</div>

<button onclick="generate()">Generate Questions</button>
<a href="/question-bank.html">Open Question Bank</a>
<a href="/upload.html">Open Upload Page</a>
<form action="/logout" method="post" style="display:inline;">
    <button type="submit">Logout</button>
</form>

<h3>Generated Questions</h3>

<div id="status"></div>
<div id="summary" class="summary"></div>
<div id="result"></div>

<script>
function generate() {
    const params = new URLSearchParams({
        topic: document.getElementById("topic").value,
        questionType: document.getElementById("questionType").value
    });

    const status = document.getElementById("status");
    const summary = document.getElementById("summary");
    const result = document.getElementById("result");

    status.innerText = "Generating questions...";
    summary.innerText = "";
    result.innerHTML = "";

    fetch("http://localhost:8080/generate-questions?" + params.toString())
        .then(response => response.json())
        .then(data => {
            status.innerText = "";
            summary.innerText = "Saved " + data.savedCount + " of " + data.requestedCount
                + " questions. Skipped duplicates: " + data.skippedDuplicates;

            if (!data.questions || data.questions.length === 0) {
                result.innerHTML = "<p>No new unique questions were saved.</p>";
                return;
            }

            data.questions.forEach((question, index) => renderQuestion(question, index, result));
        })
        .catch(() => {
            status.innerText = "Error generating questions";
            summary.innerText = "";
            result.innerHTML = "";
        });
}

function renderQuestion(question, index, target) {
    const card = document.createElement("div");
    card.className = "question-card";
    const answerData = question.answerData || {};

    card.innerHTML = `
        <div class="meta">
            <span class="badge">${escapeHtml(question.questionType)}</span>
            <span class="badge">${escapeHtml(question.complexity)}</span>
            <span class="badge">${escapeHtml(question.reviewStatus)}</span>
        </div>
        <div><strong>Q${index + 1}.</strong> ${escapeHtml(question.questionText)}</div>
        ${renderAnswerData(answerData)}
        <div><strong>Explanation:</strong> ${escapeHtml(question.explanation || "")}</div>
    `;

    target.appendChild(card);
}

function renderAnswerData(answerData) {
    if (answerData.options) {
        return `
            <div>A. ${escapeHtml(answerData.options[0] || "")}</div>
            <div>B. ${escapeHtml(answerData.options[1] || "")}</div>
            <div>C. ${escapeHtml(answerData.options[2] || "")}</div>
            <div>D. ${escapeHtml(answerData.options[3] || "")}</div>
            <div><strong>Correct:</strong> ${escapeHtml(answerData.correctOption || "")}</div>
        `;
    }

    if (answerData.acceptedAnswers) {
        return `<div><strong>Accepted answers:</strong> ${escapeHtml(answerData.acceptedAnswers.join(", "))}</div>`;
    }

    if (answerData.booleanAnswer !== undefined) {
        return `<div><strong>Answer:</strong> ${answerData.booleanAnswer ? "True" : "False"}</div>`;
    }

    if (answerData.minValue !== undefined) {
        return `<div><strong>Range:</strong> ${escapeHtml(String(answerData.minValue))} to ${escapeHtml(String(answerData.maxValue))} ${escapeHtml(answerData.unit || "")} (tolerance: ${escapeHtml(String(answerData.tolerance || ""))})</div>`;
    }

    if (answerData.modelAnswer) {
        return `
            <div><strong>Model answer:</strong> ${escapeHtml(answerData.modelAnswer)}</div>
            <div><strong>Keywords:</strong> ${escapeHtml((answerData.rubricKeywords || []).join(", "))}</div>
        `;
    }

    return `<pre>${escapeHtml(JSON.stringify(answerData, null, 2))}</pre>`;
}

function escapeHtml(value) {
    return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;")
        .replaceAll("'", "&#39;");
}
</script>

</body>
</html>
