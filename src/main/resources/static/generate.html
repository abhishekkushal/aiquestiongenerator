<!DOCTYPE html>
<html>
<head>
    <title>AI MCQ Generator</title>

    <style>
        body{
            font-family: Arial;
            margin:40px;
        }

        textarea{
            width:100%;
            height:300px;
        }

        button{
            padding:8px 20px;
            font-size:16px;
        }
    </style>

</head>

<body>

<h2>AI Question Generator</h2>

<input type="text" id="topic" placeholder="Enter topic (example: acids)" size="40">

<button onclick="generate()">Generate MCQ</button>

<h3>Generated Questions</h3>

<textarea id="result"></textarea>

<script>

function generate(){

    const topic = document.getElementById("topic").value;

    document.getElementById("result").value="Generating questions...";

    fetch("http://localhost:8080/generate-mcq?topic="+encodeURIComponent(topic))
    .then(response => response.text())
    .then(data => {

        document.getElementById("result").value=data;

    })
    .catch(error => {

        document.getElementById("result").value="Error generating questions";

    });

}

</script>

</body>
</html>
