<!DOCTYPE html>
<html>
<head>
    <title>Upload Syllabus PDF</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        button { padding: 8px 18px; }
    </style>
</head>
<body>

<h2>Upload PDF</h2>

<div style="margin-bottom: 16px;">
    <a href="/generate.html">Open Generator</a>
    <a href="/question-bank.html" style="margin-left: 12px;">Open Question Bank</a>
    <form action="/logout" method="post" style="display:inline; margin-left: 12px;">
        <button type="submit">Logout</button>
    </form>
</div>

<form id="uploadForm">
    <input type="file" id="fileInput" name="file" />
    <button type="submit">Upload</button>
</form>

<p id="result"></p>

<script>

document.getElementById("uploadForm").addEventListener("submit", function(e) {

    e.preventDefault();

    const formData = new FormData();
    formData.append("file", document.getElementById("fileInput").files[0]);

    fetch("http://localhost:8080/upload-pdf", {
        method: "POST",
        body: formData
    })
    .then(response => response.text())
    .then(data => {
        document.getElementById("result").innerText = data;
    })
    .catch(err => console.error(err));

});

</script>

</body>
</html>
